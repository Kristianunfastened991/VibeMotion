<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="600" viewBox="0 0 1280 600" role="img" aria-labelledby="title desc">
  <title id="title">Connect Figma to VibeMotion</title>
  <desc id="desc">Step by step diagram for connecting Figma through the local VibeMotion Export plugin.</desc>
  <defs>
    <style>
      .bg { fill: #f8faf7; }
      .title { font: 800 42px "Segoe UI", Arial, sans-serif; fill: #172023; }
      .subtitle { font: 500 18px "Segoe UI", Arial, sans-serif; fill: #56655f; }
      .card { fill: #ffffff; stroke: #d2ddd7; stroke-width: 2; rx: 18; }
      .dark { fill: #172023; }
      .head { font: 800 20px "Segoe UI", Arial, sans-serif; fill: #172023; }
      .copy { font: 500 15px "Segoe UI", Arial, sans-serif; fill: #56655f; }
      .small { font: 700 12px "Segoe UI", Arial, sans-serif; fill: #7b8b84; }
      .num { font: 900 31px "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .arrow { stroke: #75877f; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .a { fill: #48b8a6; }
      .b { fill: #f1c65b; }
      .c { fill: #ee8d61; }
      .d { fill: #8da2ff; }
    </style>
  </defs>
  <rect width="1280" height="600" class="bg"/>
  <text x="58" y="78" class="title">Connect Figma without a REST token</text>
  <text x="62" y="112" class="subtitle">The normal workflow uses a local Figma plugin. VibeMotion must be running before you send frames.</text>

  <g transform="translate(58 166)">
    <rect width="260" height="278" class="card"/>
    <circle cx="42" cy="42" r="27" class="dark"/>
    <text x="33" y="53" class="num">1</text>
    <rect x="88" y="28" width="128" height="44" rx="10" class="a"/>
    <text x="28" y="112" class="head">Start VibeMotion</text>
    <text x="28" y="148" class="copy">Run Launch-VibeMotion.bat</text>
    <text x="28" y="172" class="copy">and keep the terminal open.</text>
    <text x="28" y="224" class="small">Server:</text>
    <text x="28" y="246" class="copy">http://127.0.0.1:8010</text>
  </g>
  <path d="M338 304 H400" class="arrow"/>
  <path d="M390 292 l12 12 l-12 12" class="arrow"/>

  <g transform="translate(416 166)">
    <rect width="260" height="278" class="card"/>
    <circle cx="42" cy="42" r="27" class="dark"/>
    <text x="33" y="53" class="num">2</text>
    <rect x="92" y="24" width="118" height="52" rx="12" class="b"/>
    <path d="M112 42 h78 M112 58 h48" stroke="#172023" stroke-width="5"/>
    <text x="28" y="112" class="head">Open Figma file</text>
    <text x="28" y="148" class="copy">Choose a frame, component,</text>
    <text x="28" y="172" class="copy">group, section, or page.</text>
    <text x="28" y="224" class="small">Plugin appears as:</text>
    <text x="28" y="246" class="copy">VibeMotion Export</text>
  </g>
  <path d="M696 304 H758" class="arrow"/>
  <path d="M748 292 l12 12 l-12 12" class="arrow"/>

  <g transform="translate(774 166)">
    <rect width="260" height="278" class="card"/>
    <circle cx="42" cy="42" r="27" class="dark"/>
    <text x="33" y="53" class="num">3</text>
    <rect x="90" y="24" width="122" height="52" rx="12" class="c"/>
    <path d="M115 50 h72 M151 34 v34" stroke="#ffffff" stroke-width="5"/>
    <text x="28" y="112" class="head">Run plugin</text>
    <text x="28" y="148" class="copy">Plugins -> Development</text>
    <text x="28" y="172" class="copy">-> VibeMotion Export.</text>
    <text x="28" y="224" class="small">Click:</text>
    <text x="28" y="246" class="copy">Send selection or page</text>
  </g>

  <path d="M904 464 C904 522 220 522 220 464" class="arrow"/>
  <path d="M232 476 l-12 -12 l-12 12" class="arrow"/>

  <rect x="208" y="470" width="864" height="78" rx="20" fill="#172023"/>
  <circle cx="250" cy="509" r="14" class="d"/>
  <text x="280" y="501" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" fill="#ffffff">Then click Update from Figma Space in VibeMotion</text>
  <text x="280" y="528" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="500" fill="#c7d2cc">Frames appear in the left panel. Drag a frame to the timeline, select layers, add motion, or use LTX on image layers.</text>
</svg>
