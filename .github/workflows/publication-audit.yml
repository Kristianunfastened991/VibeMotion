name: Publication audit

on:
  push:
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scan for common secrets and local paths
        run: python scripts/audit_publication.py

      - name: Compile lightweight Python entry points
        run: python -m py_compile scripts/audit_publication.py app/models/schemas.py
