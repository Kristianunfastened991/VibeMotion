<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        margin: 0;
        padding: 18px;
        font: 13px/1.4 Inter, Arial, sans-serif;
        color: #111;
        background: #f7f6f2;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 18px;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 14px;
        color: #666;
      }
      label {
        display: block;
        margin: 0 0 6px;
        font-weight: 700;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        margin: 0 0 12px;
        padding: 10px 12px;
        border: 1px solid #d9d8d2;
        border-radius: 10px;
        background: #fff;
        font: inherit;
      }
      button {
        width: 100%;
        min-height: 40px;
        margin: 0 0 8px;
        border: 0;
        border-radius: 12px;
        background: #111;
        color: #fff;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }
      button.secondary {
        background: #fff;
        color: #111;
        border: 1px solid #d9d8d2;
      }
      pre {
        min-height: 92px;
        max-height: 140px;
        overflow: auto;
        margin: 10px 0 0;
        padding: 10px;
        border-radius: 10px;
        background: #fff;
        color: #333;
        white-space: pre-wrap;
        font: 12px/1.35 ui-monospace, SFMono-Regular, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <h1>VibeMotion Export</h1>
    <p>Send frames from the open Figma file. VibeMotion picks them up automatically.</p>
    <label for="server">VibeMotion server</label>
    <input id="server" value="http://127.0.0.1:8010" />
    <button id="selection">Send selection to VibeMotion</button>
    <button id="page" class="secondary">Send page to VibeMotion</button>
    <button id="restore" class="secondary">Restore frame opacity to 100%</button>
    <button id="close" class="secondary">Close</button>
    <pre id="log">Ready.</pre>

    <script>
      const server = document.getElementById("server");
      const log = document.getElementById("log");
      let autoExportStarted = false;

      function write(message) {
        log.textContent = `${message}\n${log.textContent}`.slice(0, 4000);
      }

      async function sendAssets(assets, options = {}) {
        const base = server.value.trim().replace(/\/$/, "");
        write(`Sending ${assets.length} asset(s) to ${base}...`);
        const response = await fetch(`${base}/api/figma/plugin/assets`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            assets,
            scope: options.scope || "selection",
            page: options.page || "",
            session_id: options.session_id || "",
            total: options.total || 0,
            complete: Boolean(options.complete),
          }),
        });
        if (!response.ok) {
          throw new Error(await response.text());
        }
        const payload = await response.json();
        write(`Saved ${payload.assets?.length || 0}. VibeMotion will sync automatically.`);
      }

      document.getElementById("selection").onclick = () => {
        write("Exporting selected frames...");
        parent.postMessage({ pluginMessage: { type: "export-selection" } }, "*");
      };

      document.getElementById("page").onclick = () => {
        write("Exporting current page frames...");
        parent.postMessage({ pluginMessage: { type: "export-page" } }, "*");
      };

      document.getElementById("restore").onclick = () => {
        write("Restoring faded top-level frames on current page...");
        parent.postMessage({ pluginMessage: { type: "restore-opacity" } }, "*");
      };

      document.getElementById("close").onclick = () => {
        parent.postMessage({ pluginMessage: { type: "close" } }, "*");
      };

      window.setTimeout(() => {
        if (autoExportStarted) return;
        autoExportStarted = true;
        write("Auto-exporting current page...");
        parent.postMessage({ pluginMessage: { type: "export-page" } }, "*");
      }, 700);

      window.onmessage = async (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;
        if (message.type === "progress") write(message.message);
        if (message.type === "error") write(`Error: ${message.message}`);
        if (message.type === "assets") {
          try {
            await sendAssets(message.assets || [], {
              scope: message.scope,
              page: message.page,
              session_id: message.session_id,
              total: message.total,
              complete: message.complete,
            });
          } catch (error) {
            write(`Send failed: ${error.message}`);
          }
        }
      };
    </script>
  </body>
</html>
